<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#87ceeb"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5da05d"/>
      <stop offset="100%" stop-color="#3d7a3d"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="600" cy="100" r="50" fill="#ffd700" opacity="0.9"/>
  <circle cx="600" cy="100" r="65" fill="#ffd700" opacity="0.2"/>
  <!-- Clouds -->
  <g fill="white" opacity="0.7">
    <ellipse cx="200" cy="80" rx="60" ry="25"/>
    <ellipse cx="240" cy="70" rx="50" ry="22"/>
    <ellipse cx="170" cy="75" rx="45" ry="20"/>
    <ellipse cx="500" cy="120" rx="55" ry="22"/>
    <ellipse cx="540" cy="112" rx="45" ry="18"/>
  </g>
  <!-- Mountains -->
  <polygon points="0,350 150,180 300,350" fill="#6b8e6b"/>
  <polygon points="100,350 300,150 500,350" fill="#5a7d5a"/>
  <polygon points="350,350 550,200 750,350" fill="#4d7a4d"/>
  <polygon points="550,350 700,220 800,350" fill="#5a8a5a"/>
  <!-- Ground -->
  <rect y="340" width="800" height="160" fill="url(#ground)"/>
  <!-- Trees left side (will be cropped) -->
  <rect x="40" y="270" width="12" height="70" fill="#5c4033" rx="3"/>
  <circle cx="46" cy="255" r="25" fill="#2d5a2d"/>
  <circle cx="36" cy="265" r="20" fill="#357535"/>
  <rect x="100" y="280" width="10" height="60" fill="#5c4033" rx="3"/>
  <circle cx="105" cy="268" r="22" fill="#2d6b2d"/>
  <!-- Trees right side (will be cropped) -->
  <rect x="720" y="275" width="12" height="65" fill="#5c4033" rx="3"/>
  <circle cx="726" cy="260" r="24" fill="#2d5a2d"/>
  <rect x="760" y="285" width="10" height="55" fill="#5c4033" rx="3"/>
  <circle cx="765" cy="273" r="20" fill="#357535"/>
  <!-- Center focal point - a small house -->
  <rect x="370" y="290" width="60" height="50" fill="#d4a574"/>
  <polygon points="360,290 400,260 440,290" fill="#8b4513"/>
  <rect x="388" y="310" width="14" height="30" fill="#6b3410"/>
  <rect x="376" y="300" width="10" height="10" fill="#87ceeb" stroke="#5c4033" stroke-width="1"/>
  <rect x="414" y="300" width="10" height="10" fill="#87ceeb" stroke="#5c4033" stroke-width="1"/>
  <!-- Flowers -->
  <circle cx="300" cy="370" r="4" fill="#ff6b6b"/>
  <circle cx="320" cy="380" r="3" fill="#ffd93d"/>
  <circle cx="450" cy="375" r="4" fill="#ff6b6b"/>
  <circle cx="480" cy="365" r="3" fill="#ffd93d"/>
  <circle cx="350" cy="385" r="3" fill="#ff9ff3"/>
</svg>